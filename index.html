<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACUTEBUNNY.VIP - Coming Soon</title>
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Very dark, slightly warm background color */
            background-color: #0b0408; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* The faint background bunny logo */
        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin;
            height: 80vmin;
            max-width: 600px;
            max-height: 600px;
            z-index: 1;
            /* Using pointer-events none so it doesn't block text selection */
            pointer-events: none; 
        }

        /* Abstract SVG recreation of the bunny lines */
        .bg-logo path {
            fill: none;
            /* Dark maroon/burgundy color */
            stroke: #210616; 
            stroke-width: 35;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Main content container */
        .content {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px;
        }

        /* Gradient Text */
        h1 {
            font-family: 'Arial Black', Impact, sans-serif;
            /* Scales between 2.5rem and 8rem based on screen width */
            font-size: clamp(2.5rem, 8vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 2rem;
            
            /* The vibrant pink/magenta gradient */
            background: linear-gradient(90deg, #ff4c9a 0%, #d4006c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Coming Soon section with lines */
        .coming-soon-wrapper {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 400px;
        }

        .line {
            flex-grow: 1;
            height: 1px;
            /* Faint grey line */
            background-color: rgba(255, 255, 255, 0.08); 
        }

        .coming-soon-text {
            color: #888;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        /* Bottom Footer */
        .footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            z-index: 2;
        }

        /* Adjustments for very small screens */
        @media (max-width: 480px) {
            .coming-soon-wrapper {
                gap: 0.5rem;
            }
            .coming-soon-text {
                font-size: 0.6rem;
                letter-spacing: 0.2em;
            }
            .bg-logo path {
                stroke-width: 25; /* Thinner lines on mobile to scale properly */
            }
        }
    </style>
</head>
<body>

    <!-- Background Stylized SVG Graphic -->
    <svg class="bg-logo" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <!-- Recreating the overlapping rounded line shapes from the image -->
        <!-- Left Ear -->
        <path d="M 230 110 L 300 180" />
        <path d="M 230 110 A 30 30 0 0 0 180 150 L 250 220" />
        <!-- Right Ear -->
        <path d="M 330 90 L 330 200" />
        <path d="M 330 90 A 30 30 0 0 1 390 90 L 390 250" />
        <!-- Head and Body Curve -->
        <path d="M 390 250 C 390 350 320 380 320 400 L 320 420 A 20 20 0 0 0 350 440 L 380 440" />
        <!-- Lower Body/Tail section -->
        <path d="M 250 220 C 150 250 150 380 250 420 L 320 420" />
        <path d="M 200 350 C 120 350 120 250 180 250" />
    </svg>

    <!-- Main Content -->
    <div class="content">
        <h1>ACUTEBUNNY.VIP</h1>
        
        <div class="coming-soon-wrapper">
            <div class="line"></div>
            <div class="coming-soon-text">Coming Soon</div>
            <div class="line"></div>
        </div>
    </div>

    <!-- Footer Text -->
    <div class="footer">Exclusive Access (Deez)</div>

</body>
</html>
